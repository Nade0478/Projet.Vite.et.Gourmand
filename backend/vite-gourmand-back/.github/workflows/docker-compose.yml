version: '3.8'
services:
  backend:
    build: ./backend
    ports:
      - '8000:8000'
    environment:
      - DB_HOST=db
      - DB_DATABASE=vite_gourmand
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db
  frontend:
    build: ./frontend
    ports:
      - '80:80'
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: vite_gourmand
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
volumes:
  db_data:
